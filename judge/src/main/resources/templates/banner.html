<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

  <body>
    <div th:fragment="line_judge" class="flow-text right">
      <style>
        .line_judge_banner {
          position:absolute;
          z-index:2;
          right:0;
          margin-right: 50px
        }
      </style>
      <div class="line_judge_banner">
        Line <span th:text="${settings.line_number}"></span> Judge <span th:text="${settings.judge_id}"></span>
      </div>
    </div>
    <div th:fragment="status" class="flow-text right">
      <style>
        .icon-btn {
          position: absolute;
          right: 10px;
          width: 30px;
          height: 30px;
          padding: 0;
          border: 0;
          background: transparent;
          cursor: pointer;
          z-index: 1000; /* ensure it sits above other content */
        }
        .icon-btn i:focus { outline: none; } /* keep it clean on focus */
        .icon-btn i {
          -webkit-tap-highlight-color: transparent; /* kills tap highlight on touch */
        }

        .stscounter {
          font-size: 0.8rem;
          margin-left: 5px;
          float: left;
        }

        .info-icon {
          width: 20px;
          height: 20px;
          background: transparent;
        }

        .status-info {
          position:absolute;
          right: 50px;
          text-align: right;
          padding: 5px;
          border: #aaa 1px solid;
          border-radius: 24px;
          -webkit-box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.16), 0 2px 10px 0 rgba(0, 0, 0, 0.12);
          box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.16), 0 2px 10px 0 rgba(0, 0, 0, 0.12);
          opacity: 1;
          z-index: 1000; /* ensure it sits above other content */
        }
        
        .wifi-icon {
          width: 20px;
          height: 24px;
          vertical-align: middle;
          margin-left: 8px;
        }
        .wifi-bar {
          fill: none;
          stroke-width: 6;
          stroke-linecap: round;
        }
        .wifi-inactive {
          stroke: #aaa; /* grey */
        }
        .wifi-active {
          stroke: #2ecc40; /* bright green */
        }
  
        .battery-icon {
          width: 20px;
          height: 25px;
        }
        /* states for battery level */
        .bat-high {
          stroke: #2ecc40;   /* bright green */
          fill: #2ecc40;
        }
        .bat-mid {
          stroke: #b8860b;   /* dark goldenrod */
          fill: #f1c40f;     /* rich amber/yellow */
        }
        .bat-low {
          stroke: #c0392b;   /* strong red */
          fill: #e74c3c;
        }
        .bat-inactive {
          fill: #aaa;
        }

        .con-ok {
            color: #2ecc40; /* green */
        }
        .con-fail {
            color: #e74c3c; /* red */
        }
       .hidden {
          display: none;
        }
      </style>

      <a class="btn-flat btn-small icon-btn" onclick="toggleStatus();"><i class="material-icons" style="font-size: 2.2rem" >info_outline</i></a>

      <div id="statusInfo" class="status-info right grey lighten-3 hidden" onclick="toggleStatus();">
        <span id="stsmsg">Please wait...</span>
        <span id="stsctr" class="stscounter hidden">10</span>
        <span id="appName"></span> <span id="appVersion"></span><br/>
        <div id="dynamicLines"></div>
        <svg id="wifiIcon" class="wifi-icon" style="display:none;" viewBox="0 0 64 64">
          <!-- Bars (all grey when disconnected) -->
          <circle id="bar1" class="wifi-bar wifi-inactive" cx="32" cy="52" r="2.5" stroke-width="4"/>
          <path id="bar2" class="wifi-bar wifi-inactive" d="M24 44a12 12 0 0 1 16 0"/>
          <path id="bar3" class="wifi-bar wifi-inactive" d="M18 36a20 20 0 0 1 28 0"/>
          <path id="bar4" class="wifi-bar wifi-inactive" d="M12 28a28 28 0 0 1 40 0"/>
          <path id="bar5" class="wifi-bar wifi-inactive" d="M6 20a36 36 0 0 1 52 0"/>

          <!-- Slash -->
          <line id="wifiSlash" x1="16" y1="16" x2="48" y2="48" 
                stroke="red" stroke-width="5" stroke-linecap="round"
                class="hidden"/>
        </svg>
        <svg id="batteryIcon" class="battery-icon" style="display:none;" viewBox="0 0 40 70">
          <!-- Battery body -->
          <rect id="batteryBody" x="8" y="6" width="24" height="60" rx="3" ry="3"
                stroke="#000" stroke-width="3" fill="none"/>
          <!-- Battery nub -->
          <rect id="batteryNub" x="14" y="0" width="12" height="6" rx="2" ry="2"
                stroke="#000" stroke-width="3" fill="none"/>
          
          <!-- Battery level bars -->
          <rect id="batcell1" x="12" y="50" width="16" height="10" rx="2" ry="2" fill="#ddd"/>
          <rect id="batcell2" x="12" y="40" width="16" height="10" rx="2" ry="2" fill="#ddd"/>
          <rect id="batcell3" x="12" y="30" width="16" height="10" rx="2" ry="2" fill="#ddd"/>
          <rect id="batcell4" x="12" y="20" width="16" height="10" rx="2" ry="2" fill="#ddd"/>
          <rect id="batcell5" x="12" y="10" width="16" height="10" rx="2" ry="2" fill="#ddd"/>
        </svg>
      </div>


      <script>
        let statusInfoInterval = null;

        function stopStatusInfoUpdates() {
          if (statusInfoInterval) {
            clearInterval(statusInfoInterval);
            statusInfoInterval = null;

            const counter = document.getElementById("stsctr");
            counter.textContent = "10"; // reset to 10 seconds
            counter.classList.add("hidden");
          }
        }

        function updateStatusCountdown() {
          const counter = document.getElementById("stsctr");

          if (counter.classList.contains("hidden")) {
            counter.classList.remove("hidden");
            counter.textContent = "10"; // reset to 10 seconds
          } else {
            let count = parseInt(counter.textContent);
            if (count > 0) {
              count -= 1;
              counter.textContent = count.toString();
            } else {
              counter.classList.add("hidden");
              updateStatusInfo();
            }
          }
        }

        // toggle status info visibility on click
        function toggleStatus() {
          const statusInfo = document.getElementById("statusInfo");
          statusInfo.classList.toggle("hidden");

          if (statusInfo.classList.contains("hidden")) {
            stopStatusInfoUpdates();
          } else {
            updateStatusInfo(); //poll the status info and start timer
          }
        }

        // strength: percentage (0–100)
        function updateWifiIcon(strength) {
          const slash = document.getElementById("wifiSlash");

          if (strength <= 0) {
            // show slash, all bars grey
            slash.classList.remove("hidden");
            for (let i = 1; i <= 5; i++) {
              document.getElementById("bar" + i).setAttribute("class", "wifi-bar wifi-inactive");
            }
          } else {
            slash.classList.add("hidden");
            const bars = Math.min(5, Math.ceil(strength / 20));
            for (let i = 1; i <= 5; i++) {
              document.getElementById("bar" + i).setAttribute("class", "wifi-bar " + (i <= bars ? "wifi-active" : "wifi-inactive"));
            }
          }
        }

        function updateBatteryIcon(percent) {
          percent = Math.max(0, Math.min(100, percent));
          const cells = 5;
          const filled = Math.ceil(percent / 20);

          // choose class name
          let levelClass = "bat-high";
          if (percent <= 30) levelClass = "bat-low";
          else if (percent <= 60) levelClass = "bat-mid";

          // reset body + nub classes
          const body = document.getElementById("batteryBody");
          const nub = document.getElementById("batteryNub");
          body.setAttribute("class", levelClass);
          nub.setAttribute("class", levelClass);

          // update cells bottom-up
          for (let i = 1; i <= cells; i++) {
            const cell = document.getElementById("batcell" + i);
            if (i <= filled) {
              cell.setAttribute("class", levelClass);
            } else {
              cell.setAttribute("class", "inactive");
            }
          }
        }

        function setScoreIcon(ok) {
          const icon = document.getElementById("infoIcon");
          if (!icon) return;

          icon.classList.remove("con-ok", "con-fail");  // clear old state
          icon.classList.add(ok ? "con-ok" : "con-fail");
        }

        async function updateStatusInfo() {
          try {
            if (statusInfoInterval) {
              clearInterval(statusInfoInterval);
              statusInfoInterval = null;
            }

            const response = await $.ajax({
              url: "/api/getinfo",
              success: function (data) {
              document.getElementById('stsmsg').classList.add('hidden'); //hide this once we have data
              document.getElementById('appName').textContent = data.appName || 'AeroJudge Device';
              document.getElementById('appVersion').textContent = 'v' + (data.appVersion || '?');

              const lines = data.info_lines || [];
              const container = document.getElementById('dynamicLines');
              container.innerHTML = '';
              lines.forEach(line => {
                const div = document.createElement('div');
                div.innerHTML = `
                  <span class="label">${line.label}</span>
                  ${line.name ? `<span class="name">${line.name}</span>` : ''}
                  <span class="value">${line.value}</span>
                  ${line.icon ? `<i id="infoIcon" class="material-icons info-icon">${line.icon}</i>` : ''}
                `;
                container.appendChild(div);

                // If this line is wifi strength, insert the SVG
                if (line.label && line.label.toLowerCase().includes('wifi')) {
                  const svg = document.getElementById('wifiIcon').cloneNode(true);
                  svg.style.display = 'inline-block';
                  svg.removeAttribute('id'); // Remove id to avoid duplicates
                  div.appendChild(svg);

                  const strength = line.value.replace('%', '');
                  updateWifiIcon(strength ? parseInt(strength) : 0);
                // If this line is battery strength, insert the battery SVG
                } else if (line.label && line.label.toLowerCase().includes('battery')) {
                  const svg = document.getElementById('batteryIcon').cloneNode(true);
                  svg.style.display = 'inline-block';
                  svg.removeAttribute('id'); // Remove id to avoid duplicates
                  div.appendChild(svg);

                  const strength = line.value.replace('%', '');
                  updateBatteryIcon(strength ? parseInt(strength) : 0);
                } else if (line.label && line.label.toLowerCase().includes('score status')) {
                  setScoreIcon(line.value && line.value.toLowerCase() === 'connected');
                }

                
              });
            },
              error: function (err) {
                try {
                  // If we were able to return a proper JSON Object, get the message from there.
                  M.toast({ html: 'Get info error: ' + JSON.parse(err.responseText).message, displayLength: 5000})
                } catch {
                  // Otherwise just use the default jquery way...
                  console.log("There was an error in the ajax operation: " + err.statusText);
                  console.log("ResponseText: " + err.responseText);
                  M.toast({ html: 'Get info error: ' + err.responseText.substring(0, 80), displayLength: 5000})
                }
              },
              complete: function() {}
            });

          } catch (errMsg) {
              M.toast({ html: 'Unable to get info', classes: 'toastMessage', displayLength: 5000 })
          } finally {
            // start countdown if not already running
            if (!statusInfoInterval) {
              statusInfoInterval = setInterval(updateStatusCountdown, 1000);
            }
          }

        }
      </script>
    </div>
  </body>
</html>
