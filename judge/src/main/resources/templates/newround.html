<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0" />
  <title>New Round</title>

  <link href="materialize/css/material_lcons.css" rel="stylesheet">
  <link href="materialize/css/materialize.min.css" type="text/css" rel="stylesheet" media="screen,projection" />
  <style>
    body {
      height: 100vh;
      overflow: hidden;
    }

    .page-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px 12px 12px;
    }

    .heading {
      font-size: calc(1.8vw + 2.8vh) !important;
      margin: 0 0 8px;
      font-weight: 600;
    }

    .step-title {
      font-size: calc(1.1vw + 2vh);
      margin: 4px 0 10px;
      font-weight: 500;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .round-button {
      min-height: 74px;
      height: auto;
      line-height: 1.15;
      padding: 10px;
      font-size: calc(1vw + 2vh);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: none;
      white-space: normal;
    }

    .round-button small {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      margin-top: 4px;
    }

    .panel {
      flex: 1;
      min-height: 0;
    }

    .confirm-box {
      border: 2px solid #2e7d32;
      padding: 14px;
      background: #e8f5e9;
      margin-bottom: 12px;
    }

    .confirm-title {
      font-size: calc(1.4vw + 2.4vh);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confirm-row {
      font-size: calc(.9vw + 1.8vh);
      margin: 5px 0;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .actions .btn-large {
      min-width: 150px;
      font-size: 1.2rem;
      text-transform: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body class="yellow">
<div class="page-shell yellow black-text">
  <h2 class="heading center-align">Round-by-Round Scoring Mode</h2>

  <div id="emptyPanel" class="panel center-align hidden">
    <div class="step-title">No available round can be started.</div>
    <p>Check active pilots, schedules, and round alignment from Admin.</p>
  </div>

  <div id="familyPanel" class="panel hidden">
    <div class="step-title center-align">Select Round Family</div>
    <div class="button-grid">
      <a href="#" id="precisionBtn" class="waves-effect waves-light btn-large blue darken-1 round-button">
        Precision
      </a>
      <a href="#" id="freestyleBtn" class="waves-effect waves-light btn-large purple darken-1 round-button">
        Freestyle
      </a>
    </div>
  </div>

  <div id="classPanel" class="panel hidden">
    <div class="step-title center-align">Select Class</div>
    <div id="classButtons" class="button-grid"></div>
  </div>

  <div id="typePanel" class="panel hidden">
    <div class="step-title center-align">Select Type</div>
    <div id="typeButtons" class="button-grid"></div>
  </div>

  <div id="confirmPanel" class="panel hidden">
    <div class="confirm-box">
      <div class="confirm-title center-align" id="confirmTitle"></div>
      <div class="confirm-row"><strong>Round:</strong> <span id="confirmRound"></span></div>
      <div class="confirm-row"><strong>Schedule:</strong> <span id="confirmSchedule"></span></div>
      <div class="confirm-row"><strong>Pilots:</strong> <span id="confirmPilots"></span></div>
      <div class="confirm-row"><strong>Sequence Count:</strong> <span id="confirmSequences"></span></div>
    </div>
    <div class="actions">
      <a href="#" id="backBtn" class="waves-effect waves-light btn-large grey darken-1">Reselect</a>
      <a href="#" id="startRoundBtn" class="waves-effect waves-light btn-large green darken-1">Start Round</a>
    </div>
  </div>
</div>

<div class="fixed-action-btn">
  <a class="btn-floating btn-large red">
    <i class="large material-icons">menu</i>
  </a>
  <ul>
    <li><a class="btn-floating btn-large green" href="/"><i class="material-icons">home</i></a></li>
  </ul>
</div>

<script src="jquery-3.6.4.min.js"></script>
<script src="materialize/js/materialize.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  M.AutoInit();

  const roundOptions = /*[[${roundOptions}]]*/ [];
  const classOrder = ['BASIC', 'SPORTSMAN', 'INTERMEDIATE', 'ADVANCED', 'UNLIMITED', 'INVITATIONAL'];
  let selectedFamily = null;
  let selectedClass = null;
  let selectedOption = null;

  document.addEventListener('DOMContentLoaded', function () {
    if (!roundOptions || roundOptions.length === 0) {
      showPanel('emptyPanel');
      return;
    }

    const hasPrecision = roundOptions.some(option => option.family === 'Precision');
    const hasFreestyle = roundOptions.some(option => option.family === 'Freestyle');

    if (hasPrecision && hasFreestyle) {
      showPanel('familyPanel');
    } else if (hasFreestyle) {
      selectFamily('Freestyle');
    } else {
      selectFamily('Precision');
    }
  });

  $('#precisionBtn').on('click', function (e) {
    e.preventDefault();
    selectFamily('Precision');
  });

  $('#freestyleBtn').on('click', function (e) {
    e.preventDefault();
    selectFamily('Freestyle');
  });

  $('#backBtn').on('click', function (e) {
    e.preventDefault();
    selectedOption = null;
    if (selectedFamily === 'Precision') {
      showClassSelection();
    } else {
      showPanel('familyPanel');
    }
  });

  $('#startRoundBtn').on('click', function (e) {
    e.preventDefault();
    if (!selectedOption) {
      return;
    }

    $.ajax({
      type: 'POST',
      url: '/api/rounds',
      data: JSON.stringify({
        type: selectedOption.type,
        comp_class: selectedOption.compClass,
        round_num: selectedOption.roundNum,
        sched_id: String(selectedOption.schedId),
        sched_desc: selectedOption.schedDesc,
        sequences: selectedOption.sequences
      }),
      contentType: 'application/json; charset=utf-8',
      dataType: 'json',
      success: function () {
        window.location.replace('/pilot-list-round');
      },
      error: function (err) {
        let message = 'Could not start round.';
        try {
          message = JSON.parse(err.responseText).message || message;
        } catch (e) {
          if (err.responseText) {
            message = err.responseText.substring(0, 80);
          }
        }
        M.toast({ html: message, classes: 'red', displayLength: 4000 });
      }
    });
  });

  function selectFamily(family) {
    selectedFamily = family;
    selectedClass = null;

    if (family === 'Freestyle') {
      const option = roundOptions.find(roundOption => roundOption.family === 'Freestyle');
      showConfirmation(option);
      return;
    }

    showClassSelection();
  }

  function showClassSelection() {
    const classes = uniqueValues(roundOptions
      .filter(option => option.family === 'Precision')
      .map(option => option.compClass))
      .sort((a, b) => classSortIndex(a) - classSortIndex(b));

    const container = $('#classButtons');
    container.empty();

    classes.forEach(function (className) {
      $('<a href="#" class="waves-effect waves-light btn-large teal darken-1 round-button"></a>')
        .text(displayClass(className))
        .on('click', function (e) {
          e.preventDefault();
          selectClass(className);
        })
        .appendTo(container);
    });

    showPanel('classPanel');
  }

  function selectClass(className) {
    selectedClass = className;
    const options = roundOptions.filter(option =>
      option.family === 'Precision' && option.compClass === className);

    if (options.length === 1) {
      showConfirmation(options[0]);
      return;
    }

    const container = $('#typeButtons');
    container.empty();

    options.forEach(function (option) {
      $('<a href="#" class="waves-effect waves-light btn-large orange darken-1 round-button"></a>')
        .html(displayType(option.type) + '<small>Round ' + option.roundNum + '</small>')
        .on('click', function (e) {
          e.preventDefault();
          showConfirmation(option);
        })
        .appendTo(container);
    });

    showPanel('typePanel');
  }

  function showConfirmation(option) {
    selectedOption = option;
    const title = option.family === 'Freestyle'
      ? 'Freestyle'
      : displayClass(option.compClass) + ' ' + displayType(option.type);

    $('#confirmTitle').text(title);
    $('#confirmRound').text(option.roundNum);
    $('#confirmSchedule').text(option.schedDesc);
    $('#confirmPilots').text(option.pilotCount);
    $('#confirmSequences').text(option.sequences);
    showPanel('confirmPanel');
  }

  function showPanel(panelId) {
    $('.panel').addClass('hidden');
    $('#' + panelId).removeClass('hidden');
  }

  function uniqueValues(values) {
    return values.filter((value, index, self) => value && self.indexOf(value) === index);
  }

  function classSortIndex(className) {
    const index = classOrder.indexOf(className);
    return index === -1 ? classOrder.length : index;
  }

  function displayClass(className) {
    if (!className) {
      return '';
    }
    return className.charAt(0).toUpperCase() + className.slice(1).toLowerCase();
  }

  function displayType(type) {
    if (type === 'KNOWN') {
      return 'Known';
    }
    if (type === 'UNKNOWN') {
      return 'Unknown';
    }
    return 'Freestyle';
  }

  /*]]>*/
</script>
</body>
</html>
