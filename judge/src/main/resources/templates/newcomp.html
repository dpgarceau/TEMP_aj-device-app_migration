<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0" />
  <title>First Boot Setup</title>

  <!-- CSS  -->
  <link href="materialize/css/material_lcons.css" rel="stylesheet">
  <link href="materialize/css/materialize.min.css" type="text/css" rel="stylesheet" media="screen,projection" />
  <style>
    .heading {
      font-size: calc(2vw + 3vh) !important;
      margin-bottom: 5px;
      margin-top: 5px;
    }
    .admin-box {
      border: 2px solid #90a4ae;
      border-radius: 8px;
      padding: 15px 20px;
      margin-bottom: 15px;
      background: #fafafa;
    }
    .admin-box-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #455a64;
    }
    .step-number {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: #1565c0;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-weight: bold;
      margin-right: 10px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .setting-label {
      font-size: 1rem;
      font-weight: 500;
      min-width: 140px;
    }
    .radio-group {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }
    [type="radio"]:not(:checked)+span, [type="radio"]:checked+span {
      padding-left: 25px;
      font-size: 1rem;
    }
    .number-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .number-btn {
      width: 50px;
      height: 50px;
      font-size: 1.5rem;
      padding: 0;
      line-height: 50px;
    }
    .number-display {
      font-size: 1.8rem;
      font-weight: 600;
      min-width: 50px;
      text-align: center;
    }
    .load-box {
      border: 2px solid #2e7d32;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      background: #e8f5e9;
      text-align: center;
    }
    .load-box-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2e7d32;
    }
  </style>
</head>

<body class="orange lighten-4">
  <div th:replace="~{banner::status}"></div>

  <div class="section no-pad-bot orange lighten-4" id="index-banner">
    <div class="container orange lighten-4 black-text">

      <!-- Header -->
      <div class="row" style="margin-bottom: 10px;">
        <div class="col s12 center-align">
          <h2 class="heading">First Boot - Event Setup Required</h2>
        </div>
      </div>

      <!-- Step 1: Event Settings -->
      <div class="admin-box">
        <div class="admin-box-title">
          <span class="step-number">1</span>
          Event Settings
        </div>

        <div class="setting-row">
          <div class="setting-label">Known Sequences:</div>
          <div class="radio-group">
            <label class="black-text">
              <input class="with-gap" name="knownSeqCount" type="radio" value="1" id="seq_single" />
              <span>Single (1)</span>
            </label>
            <label class="black-text">
              <input class="with-gap" name="knownSeqCount" type="radio" value="2" id="seq_double" checked />
              <span>Double (2)</span>
            </label>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">Sequence Type:</div>
          <div class="radio-group">
            <label class="black-text">
              <input class="with-gap" name="sequenceType" type="radio" value="std" id="std_seqType" checked />
              <span>Standard</span>
            </label>
            <label class="black-text">
              <input class="with-gap" name="sequenceType" type="radio" value="alt" id="alt_seqType" />
              <span>Alternate</span>
            </label>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">Scoring Mode:</div>
          <div class="radio-group">
            <label class="black-text">
              <input class="with-gap" name="score_mode" type="radio" value="global" checked />
              <span>Global</span>
            </label>
            <label class="black-text">
              <input class="with-gap" name="score_mode" type="radio" value="byRound" />
              <span>By Round</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Step 2: Device Identity -->
      <div class="admin-box">
        <div class="admin-box-title">
          <span class="step-number">2</span>
          Device Identity
        </div>

        <div class="setting-row">
          <div class="setting-label">Line Number:</div>
          <div class="number-control">
            <a href="#" class="btn number-btn blue" id="lineDown"><i class="material-icons">remove</i></a>
            <span class="number-display" id="lineNumber">1</span>
            <a href="#" class="btn number-btn blue" id="lineUp"><i class="material-icons">add</i></a>
          </div>
        </div>

        <div class="setting-row">
          <div class="setting-label">Judge Number:</div>
          <div class="number-control">
            <a href="#" class="btn number-btn blue" id="judgeDown"><i class="material-icons">remove</i></a>
            <span class="number-display" id="judgeNumber">1</span>
            <a href="#" class="btn number-btn blue" id="judgeUp"><i class="material-icons">add</i></a>
          </div>
        </div>
      </div>

      <!-- Step 3: Load Event -->
      <div class="load-box">
        <div class="load-box-title">
          <span class="step-number" style="background: #2e7d32;">3</span>
          Connect to Score Server
        </div>
        <p style="margin-bottom: 15px; color: #555;">This will connect to Score and load the event data.</p>
        <a href="#" id="loadEvent" class="waves-effect waves-light btn-large green darken-1 pulse">
          <i class="material-icons left">cloud_download</i>Load Event
        </a>
      </div>

    </div>
  </div>

  <div class="fixed-action-btn">
    <a class="btn-floating btn-large red">
      <i class="large material-icons">menu</i>
    </a>
    <ul>
      <li><a class="btn-floating btn-large green" href="/"><i class="material-icons">home</i></a></li>
    </ul>
  </div>

  <!--  Scripts-->
  <script src="jquery-3.6.4.min.js"></script>
  <script src="materialize/js/materialize.js"></script>
  <script th:inline="javascript">
    /*<![CDATA[*/
    const lineNumber = /*[[${lineNumber}]]*/ 1;
    const judgeId = /*[[${judgeId}]]*/ 1;
    const maxSeqPerRound = /*[[${maxSeqPerRound}]]*/ 2;
    const sequenceType = /*[[${sequenceType}]]*/ 'std';
    const scoreMode = /*[[${scoreMode}]]*/ 'global';

    let currentLineNumber = lineNumber;
    let currentJudgeId = judgeId;

    document.addEventListener('DOMContentLoaded', function () {
      // Initialize floating action button
      var elems = document.querySelectorAll('.fixed-action-btn');
      M.FloatingActionButton.init(elems, { hoverEnabled: false });

      // Set current values from server
      $('#lineNumber').text(currentLineNumber);
      $('#judgeNumber').text(currentJudgeId);

      // Set sequence count
      if (maxSeqPerRound == 1) {
        $('#seq_single').prop('checked', true);
      } else {
        $('#seq_double').prop('checked', true);
      }

      // Set sequence type
      $("input[name=sequenceType][value=" + sequenceType + "]").prop('checked', true);

      // Set scoring mode
      $("input[name=score_mode][value=" + scoreMode + "]").prop('checked', true);
    });

    // Line Number controls
    $('#lineDown').click(function(e) {
      e.preventDefault();
      if (currentLineNumber > 1) {
        currentLineNumber--;
        $('#lineNumber').text(currentLineNumber);
      }
    });

    $('#lineUp').click(function(e) {
      e.preventDefault();
      if (currentLineNumber < 8) {
        currentLineNumber++;
        $('#lineNumber').text(currentLineNumber);
      }
    });

    // Judge Number controls
    $('#judgeDown').click(function(e) {
      e.preventDefault();
      if (currentJudgeId > 1) {
        currentJudgeId--;
        $('#judgeNumber').text(currentJudgeId);
      }
    });

    $('#judgeUp').click(function(e) {
      e.preventDefault();
      if (currentJudgeId < 8) {
        currentJudgeId++;
        $('#judgeNumber').text(currentJudgeId);
      }
    });

    // Load Event button
    $("#loadEvent").click(function(e) {
      e.preventDefault();

      var sequences = parseInt($('input[name="knownSeqCount"]:checked').val());
      var seqType = $('input[name="sequenceType"]:checked').val();
      var selectedMode = $('input[name="score_mode"]:checked').val();

      // Step 1: Save settings (line_number, judge_id)
      $.ajax({
        type: "GET",
        url: "/api/settings",
        dataType: "json",
        success: function(currentSettings) {
          // Merge new values
          currentSettings.line_number = $('#lineNumber').text();
          currentSettings.judge_id = $('#judgeNumber').text();

          // Save merged settings
          $.ajax({
            type: "POST",
            url: "/api/settings",
            data: JSON.stringify(currentSettings),
            contentType: "application/json; charset=utf-8",
            dataType: "json",
            success: function(data) {
              if (data.result === "ok") {
                // Step 2: Load NEW event (edit=false)
                $.ajax({
                  type: "POST",
                  url: "/api/comp?edit=false",
                  data: JSON.stringify({
                    score_mode: selectedMode,
                    sequences: sequences,
                    unknown_sequences: 1,
                    sequenceType: seqType
                  }),
                  contentType: "application/json; charset=utf-8",
                  dataType: "json",
                  success: function(data) {
                    if (data.result === "ok") {
                      M.toast({ html: 'Event loaded successfully', classes: 'green', displayLength: 2000 });
                      setTimeout(function() {
                        window.location = '/validate-sequences';
                      }, 2000);
                    } else {
                      M.toast({ html: 'Error: ' + data.message, classes: 'red' });
                    }
                  },
                  error: function(errObj) {
                    var msg = 'Could not connect to Score server';
                    if (typeof errObj.responseJSON != "undefined") {
                      msg = 'Error: ' + errObj.responseJSON.message;
                    }
                    M.toast({ html: msg, classes: 'red', displayLength: 4000 });
                  }
                });
              } else {
                M.toast({ html: 'Error saving settings: ' + data.message, classes: 'red' });
              }
            },
            error: function() {
              M.toast({ html: 'Error saving settings', classes: 'red' });
            }
          });
        },
        error: function() {
          M.toast({ html: 'Error fetching settings', classes: 'red' });
        }
      });
    });

    /*]]>*/
  </script>

</body>

</html>
