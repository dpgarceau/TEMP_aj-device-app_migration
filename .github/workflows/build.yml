# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Create Release

on:
  push:
    tags: 
      - 'v*.*'
      - 'v*.*.*'
  workflow_run:
    workflows: ["Create Tag"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to build/release (e.g., v2.1.2)"
        required: true
        type: string
jobs:
  build:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref) }}

    - name: Detect releasable changes
      id: detect-changes
      shell: bash
      run: |
        set -euo pipefail

        tag=""
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          tag="${{ inputs.release_tag }}"
        elif [ "${{ github.event_name }}" = "workflow_run" ]; then
          head_sha="${{ github.event.workflow_run.head_sha }}"
          tag="$(git tag --points-at "$head_sha" | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -V | tail -n 1 || true)"
          if [ -z "$tag" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No stable version tag found on workflow_run commit $head_sha; skipping build/release"
            exit 0
          fi
        else
          tag="${{ github.ref_name }}"
        fi

        git fetch --tags
        if ! git rev-parse "$tag^{tag}" >/dev/null 2>&1; then
          echo "should_release=false" >> "$GITHUB_OUTPUT"
          echo "Tag $tag was not found"
          exit 0
        fi

        git checkout -q "$tag"

        previous_stable_tag="$(git tag --merged "$tag" --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | grep -v "^${tag}$" | head -n 1 || true)"

        if [ -n "$previous_stable_tag" ]; then
          changed_files="$(git diff --name-only "$previous_stable_tag..$tag")"
          echo "Comparing changes from $previous_stable_tag to $tag"
        else
          changed_files="$(git diff-tree --no-commit-id --name-only -r "$tag" || true)"
          echo "No previous stable tag found; checking files in tagged commit $tag"
        fi

        if echo "$changed_files" | grep -E '^(pom\.xml|judge/|figures/|volume_service/)' >/dev/null; then
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Releasable changes detected"
        else
          echo "should_release=false" >> "$GITHUB_OUTPUT"
          echo "No releasable changes detected; skipping build/release"
        fi

          echo "previous_stable_tag=$previous_stable_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

    - name: Skip summary
      if: steps.detect-changes.outputs.should_release != 'true'
      run: echo "Skipping release because no changes were found in pom.xml, judge/, figures/, or volume_service/"

    - uses: actions/setup-java@v5
      if: steps.detect-changes.outputs.should_release == 'true'
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Align Maven version with release tag
      if: steps.detect-changes.outputs.should_release == 'true'
      shell: bash
      run: |
          set -euo pipefail

          release_version="${{ steps.detect-changes.outputs.release_tag }}"
          release_version="${release_version#v}"
          if ! [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vYY.MAJOR.MINOR, such as v26.1.0" >&2
            exit 1
          fi

          RELEASE_VERSION="$release_version" perl -0pi -e 's/(<artifactId>aerojudge-device-app<\/artifactId>\s*<version>)[^<]+/${1}$ENV{RELEASE_VERSION}/g' pom.xml judge/pom.xml
          RELEASE_VERSION="$release_version" perl -0pi -e 's/(<artifactId>judge<\/artifactId>\s*<version>)[^<]+/${1}$ENV{RELEASE_VERSION}/g' judge/pom.xml

          grep -n "<version>$release_version</version>" pom.xml judge/pom.xml
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: |
          cd judge
          mvn clean package
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: ls judge/target/
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: mkdir staging && cp judge/target/*.jar staging/judge.jar
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: cp judge/target/*.zip staging/figures.zip
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: zip -r volume_service.zip volume_service/* && cp volume_service.zip staging/
    - if: steps.detect-changes.outputs.should_release == 'true'
      run: ls staging/
    - uses: actions/upload-artifact@v7
      if: steps.detect-changes.outputs.should_release == 'true'
      with:
        name: Package
        path: staging
    - name: Create or update release assets
      if: steps.detect-changes.outputs.should_release == 'true'
      run: |
        tag="${{ steps.detect-changes.outputs.release_tag }}"
        previous_stable_tag="${{ steps.detect-changes.outputs.previous_stable_tag }}"
        repo="${{ github.repository }}"
        assets=(
          staging/judge.jar
          staging/figures.zip
          staging/volume_service.zip
        )
        notes_file="release-notes.md"

        is_prerelease=false
        if [[ "$tag" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?- ]]; then
          is_prerelease=true
        fi

        # Keep a single RC release per base version by deleting older prerelease tags/releases.
        if [ "$is_prerelease" = true ]; then
          base_tag="${tag%%-*}"
          while IFS=$'\t' read -r release_id existing_tag; do
            [ -z "$release_id" ] && continue
            if [[ "$existing_tag" == "$base_tag"-* ]] && [[ "$existing_tag" != "$tag" ]]; then
              echo "Deleting older prerelease release $existing_tag"
              gh api -X DELETE "repos/$repo/releases/$release_id"
              echo "Deleting older prerelease tag $existing_tag"
              git push origin ":refs/tags/$existing_tag" || true
            fi
          done < <(gh api "repos/$repo/releases?per_page=100" --jq '.[] | select(.prerelease == true) | "\(.id)\t\(.tag_name)"')
        fi

        compare_text=""
        commit_list=""
        if [ -n "$previous_stable_tag" ]; then
          compare_url="https://github.com/$repo/compare/$previous_stable_tag...$tag"
          compare_text="[Full Changelog]($compare_url)"
          commit_list="$(git log --pretty=format:'- %s (%h)' "$previous_stable_tag..$tag" || true)"
          heading="## Changes Since $previous_stable_tag"
        else
          commit_list="$(git log -1 --pretty=format:'- %s (%h)' "$tag" || true)"
          heading="## Changes"
        fi

        if [ -z "$commit_list" ]; then
          commit_list="- No commit messages found in the release range."
        fi

        {
          echo "$heading"
          echo
          echo "$commit_list"
          if [ -n "$compare_text" ]; then
            echo
            echo "$compare_text"
          fi
        } > "$notes_file"

        if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
          echo "Release for $tag already exists; replacing assets only"
          gh release upload "$tag" "${assets[@]}" --clobber --repo "$repo"
          if [ "$is_prerelease" = true ]; then
            gh release edit "$tag" --title "Release: $tag" --notes-file "$notes_file" --prerelease --repo "$repo"
          fi
        else
          echo "Creating release for $tag"
          release_cmd=(
            gh release create "$tag" "${assets[@]}"
            --title "Release: $tag"
            --notes-file "$notes_file"
            --repo "$repo"
          )

          if [ "$is_prerelease" = true ]; then
            release_cmd+=(--prerelease)
          fi

          "${release_cmd[@]}"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
