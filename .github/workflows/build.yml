name: Create Release

# Builds and publishes assets for strict stable vYY.MAJOR.MINOR tags.
# Create Tag owns release-relevant path detection; successful Create Tag
# completion is the automatic handoff because tags pushed with GITHUB_TOKEN do
# not trigger follow-on tag-push workflows.
on:
  workflow_run:
    workflows: ["Create Tag"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing stable tag to build/release (for example, v26.1.0)"
        required: true
        type: string

jobs:
  build:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Resolve release tag
      id: release
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          tag="${{ inputs.release_tag }}"
        else
          head_sha="${{ github.event.workflow_run.head_sha }}"
          # Automatic releases use the strict stable tag created by Create Tag
          # on the same main commit. Do not re-run release path detection here.
          tag="$(git tag --points-at "$head_sha" | grep -E '^v[0-9]{2}\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [ -z "$tag" ]; then
            echo "Release tag validation failed." >&2
            echo "Create Tag completed successfully, but no stable vYY.MAJOR.MINOR tag points at commit $head_sha." >&2
            echo "Release assets were not published because the automatic handoff tag could not be found." >&2
            exit 1
          fi
        fi

        # Manual rebuilds must name an existing stable tag. Automatic runs must
        # find one at the successful Create Tag commit.
        if [[ ! "$tag" =~ ^v[0-9]{2}\.[0-9]+\.[0-9]+$ ]]; then
          echo "Release tag validation failed." >&2
          echo "Tag: ${tag:-<missing>}" >&2
          echo "Expected stable tag format: vYY.MAJOR.MINOR, for example v26.1.0" >&2
          exit 1
        fi

        git fetch --tags
        if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Release tag validation failed." >&2
          echo "Tag $tag does not exist." >&2
          echo "Manual dispatch requires an explicit existing stable tag." >&2
          exit 1
        fi

        git checkout -q "$tag"

        release_version="${tag#v}"
        previous_stable_tag="$(git tag --merged "$tag" --sort=-v:refname | grep -E '^v[0-9]{2}\.[0-9]+\.[0-9]+$' | grep -v "^${tag}$" | head -n 1 || true)"

        echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
        echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
        echo "previous_stable_tag=$previous_stable_tag" >> "$GITHUB_OUTPUT"
        echo "Release tag: $tag"
        echo "Release version: $release_version"
        echo "Previous stable tag: ${previous_stable_tag:-<none>}"

    - uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Align Maven version to release tag
      # Temporary runner-only change. Do not commit or push this generated
      # MINOR version back to main.
      run: mvn -B versions:set -DnewVersion="${{ steps.release.outputs.release_version }}" -DgenerateBackupPoms=false

    - name: Build package
      run: |
        cd judge
        mvn -B clean package

    - name: Stage release assets
      shell: bash
      run: |
        set -euo pipefail

        rm -rf staging
        mkdir staging

        # Stage exact public asset names consumed by setup/update scripts.
        mapfile -t jar_files < <(find judge/target -maxdepth 1 -type f -name '*.jar' ! -name '*.original' | sort)
        if [ "${#jar_files[@]}" -ne 1 ]; then
          echo "Release asset staging failed." >&2
          echo "Expected exactly one packaged judge jar in judge/target." >&2
          echo "Found jar count: ${#jar_files[@]}" >&2
          printf 'Jars found:\n%s\n' "${jar_files[@]:-<none>}" >&2
          exit 1
        fi

        mapfile -t figure_zips < <(find judge/target -maxdepth 1 -type f -name '*figures*.zip' | sort)
        if [ "${#figure_zips[@]}" -ne 1 ]; then
          echo "Release asset staging failed." >&2
          echo "Expected exactly one figures zip in judge/target." >&2
          echo "Found figures zip count: ${#figure_zips[@]}" >&2
          printf 'Figures zips found:\n%s\n' "${figure_zips[@]:-<none>}" >&2
          exit 1
        fi

        cp "${jar_files[0]}" staging/judge.jar
        cp "${figure_zips[0]}" staging/figures.zip
        zip -qr staging/volume_service.zip volume_service

        for asset in staging/judge.jar staging/figures.zip staging/volume_service.zip; do
          if [ ! -s "$asset" ]; then
            echo "Release asset contract validation failed." >&2
            echo "Required staged asset is missing or empty: $asset" >&2
            exit 1
          fi
        done

        echo "Staged release assets:"
        ls -l staging

    - name: Validate jar manifest version
      shell: bash
      run: |
        set -euo pipefail

        jar_path="staging/judge.jar"
        expected_version="${{ steps.release.outputs.release_version }}"
        # The packaged app version must match the release tag exactly.
        manifest_version="$(unzip -p "$jar_path" META-INF/MANIFEST.MF 2>/dev/null | tr -d '\r' | awk -F': ' '/^Implementation-Version:/ {print $2; exit}')"

        if [ "$manifest_version" != "$expected_version" ]; then
          echo "Release version validation failed." >&2
          echo "Release tag: ${{ steps.release.outputs.release_tag }}" >&2
          echo "Expected release version: $expected_version" >&2
          echo "Manifest Implementation-Version found: ${manifest_version:-<missing>}" >&2
          echo "judge.jar path inspected: $jar_path" >&2
          echo "Release assets were not published because the packaged app version does not match the release tag." >&2
          exit 1
        fi

        echo "Manifest Implementation-Version validated: $manifest_version"

    - uses: actions/upload-artifact@v7
      with:
        name: Package
        path: staging

    - name: Create or update release assets
      shell: bash
      run: |
        set -euo pipefail

        tag="${{ steps.release.outputs.release_tag }}"
        previous_stable_tag="${{ steps.release.outputs.previous_stable_tag }}"
        repo="${{ github.repository }}"
        expected_assets=$'figures.zip\njudge.jar\nvolume_service.zip'
        assets=(
          staging/judge.jar
          staging/figures.zip
          staging/volume_service.zip
        )

        # Existing releases are rebuilds: preserve notes, replace only approved
        # assets, and fail before upload if unexpected assets are present.
        release_exists=false
        if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
          release_exists=true
          actual_assets="$(gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' | sort || true)"
          extra_assets="$(comm -13 <(printf '%s\n' "$expected_assets" | sort) <(printf '%s\n' "$actual_assets" | sort) || true)"
          if [ -n "$extra_assets" ]; then
            echo "Release asset contract validation failed." >&2
            echo "Release tag: $tag" >&2
            echo "Expected asset names:" >&2
            printf '%s\n' "$expected_assets" >&2
            echo "Actual asset names found on the GitHub Release:" >&2
            printf '%s\n' "${actual_assets:-<none>}" >&2
            echo "Extra assets:" >&2
            printf '%s\n' "$extra_assets" >&2
            echo "Release assets were not published because the Phase 1 asset contract must be fixed before the release can be used." >&2
            exit 1
          fi
        fi

        if [ "$release_exists" = true ]; then
          echo "Release for $tag already exists; replacing approved assets and preserving release notes."
          gh release upload "$tag" "${assets[@]}" --clobber --repo "$repo"
        else
          notes_file="release-notes.md"
          compare_text=""
          commit_list=""
          if [ -n "$previous_stable_tag" ]; then
            compare_url="https://github.com/$repo/compare/$previous_stable_tag...$tag"
            compare_text="[Full Changelog]($compare_url)"
            commit_list="$(git log --pretty=format:'- %s (%h)' "$previous_stable_tag..$tag" || true)"
            heading="## Changes Since $previous_stable_tag"
          else
            commit_list="$(git log -1 --pretty=format:'- %s (%h)' "$tag" || true)"
            heading="## Changes"
          fi

          if [ -z "$commit_list" ]; then
            commit_list="- No commit messages found in the release range."
          fi

          {
            echo "$heading"
            echo
            echo "$commit_list"
            if [ -n "$compare_text" ]; then
              echo
              echo "$compare_text"
            fi
          } > "$notes_file"

          echo "Creating release for $tag"
          gh release create "$tag" "${assets[@]}" --title "Release: $tag" --notes-file "$notes_file" --repo "$repo"
        fi

        actual_assets="$(gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' | sort || true)"
        missing_assets="$(comm -23 <(printf '%s\n' "$expected_assets" | sort) <(printf '%s\n' "$actual_assets" | sort) || true)"
        extra_assets="$(comm -13 <(printf '%s\n' "$expected_assets" | sort) <(printf '%s\n' "$actual_assets" | sort) || true)"

        if [ -n "$missing_assets" ] || [ -n "$extra_assets" ]; then
          echo "Release asset contract validation failed." >&2
          echo "Release tag: $tag" >&2
          echo "Expected asset names:" >&2
          printf '%s\n' "$expected_assets" >&2
          echo "Actual asset names found on the GitHub Release:" >&2
          printf '%s\n' "${actual_assets:-<none>}" >&2
          echo "Missing assets:" >&2
          printf '%s\n' "${missing_assets:-<none>}" >&2
          echo "Extra assets:" >&2
          printf '%s\n' "${extra_assets:-<none>}" >&2
          echo "The release asset contract must be fixed before the release can be used." >&2
          exit 1
        fi

        echo "Release asset contract validated for $tag."
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
