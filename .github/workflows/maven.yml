# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Create Tag

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Detect releasable changes
      id: detect-changes
      shell: bash
      run: |
        set -euo pipefail

        git fetch --tags

        changed_files=""
        if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
          changed_files="$(git diff --name-only "${{ github.event.before }}..${{ github.sha }}")"
          echo "Comparing push range: ${{ github.event.before }}..${{ github.sha }}"
        else
          latest_stable_tag="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+(\.[0-9]+)?$' | head -n 1 || true)"
          if [ -n "$latest_stable_tag" ]; then
            changed_files="$(git diff --name-only "$latest_stable_tag..HEAD")"
            echo "Comparing manual range: $latest_stable_tag..HEAD"
          else
            changed_files="$(git ls-tree -r --name-only HEAD)"
            echo "No stable tags found; checking repository contents at HEAD"
          fi
        fi

        if echo "$changed_files" | grep -E '^(pom\.xml|judge/|figures/|volume_service/)' >/dev/null; then
          echo "should_tag=true" >> "$GITHUB_OUTPUT"
          echo "Releasable changes detected"
        else
          echo "should_tag=false" >> "$GITHUB_OUTPUT"
          echo "No releasable changes detected; skipping tag creation"
        fi

    - name: Skip summary
      if: steps.detect-changes.outputs.should_tag != 'true'
      run: echo "Skipping tag creation because no changes were found in pom.xml, judge/, figures/, or volume_service/"

    - name: Generate Release Tag
      id: increment-tag
      if: steps.detect-changes.outputs.should_tag == 'true'
      shell: bash
      run: |
        set -euo pipefail
        git fetch --tags

        project_version="$(grep -m1 -oE '<version>[0-9]+\.[0-9]+\.[0-9]+</version>' pom.xml | sed -E 's#</?version>##g')"
        if ! [[ "$project_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Root pom.xml version must use YY.MAJOR.MINOR, such as 26.1.0" >&2
          exit 1
        fi

        base_prefix="v${project_version%.*}"
        base_prefix_regex="${base_prefix//./\\.}"
        latest_tag="$(git tag --list "${base_prefix}.*" --sort=-v:refname | grep -E "^${base_prefix_regex}\.[0-9]+$" | head -n 1 || true)"

        if [ -z "$latest_tag" ]; then
          new_tag="v$project_version"
          echo "No release tags found for $base_prefix; starting at $new_tag"
        else
          last_number=${latest_tag##*.}
          new_number=$((last_number + 1))
          new_tag="$base_prefix.$new_number"
          echo "Latest release tag for $base_prefix is $latest_tag; incremented to $new_tag"
        fi

        echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

    - name: Create Tag
      if: steps.detect-changes.outputs.should_tag == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git tag -a ${{ steps.increment-tag.outputs.new_tag }} -m "Latest released version"
        git push origin ${{ steps.increment-tag.outputs.new_tag }}
